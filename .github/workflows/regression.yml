name: Regression Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      run_full_suite:
        description: 'Run full regression suite (not just smoke)'
        type: boolean
        default: true

jobs:
  regression:
    name: Python Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: test
      ENABLE_TEST_ENDPOINTS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: pip install -r requirements-test.txt

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Write .env.test
        run: |
          cat > .env.test << 'EOF'
          TEST_BASE_URL=http://localhost:8888
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_ADMIN_EMAIL=${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD=${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_CLIENT_EMAIL=${{ secrets.TEST_CLIENT_EMAIL }}
          TEST_CLIENT_PASSWORD=${{ secrets.TEST_CLIENT_PASSWORD }}
          TEST_IN_ZONE_ZIP=${{ secrets.TEST_IN_ZONE_ZIP || '30301' }}
          TEST_OUT_OF_ZONE_ZIP=${{ secrets.TEST_OUT_OF_ZONE_ZIP || '10001' }}
          TEST_EXCLUDED_ZIP=${{ secrets.TEST_EXCLUDED_ZIP || '30399' }}
          TEST_UNAVAILABLE_ZIP=${{ secrets.TEST_UNAVAILABLE_ZIP || '30350' }}
          TEST_LOOKUP_SECRET=${{ secrets.TEST_LOOKUP_SECRET }}
          TEST_DATA_NAMESPACE=E2E
          NODE_ENV=test
          ENABLE_TEST_ENDPOINTS=true
          TEST_LOOKUP_SECRET=${{ secrets.TEST_LOOKUP_SECRET }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SERVICE_AREA_SERVICEABLE_ZIPS=${{ secrets.TEST_IN_ZONE_ZIP || '30301' }}
          EOF

      - name: Start netlify dev (background)
        run: |
          netlify dev --port 8888 &
          echo "NETLIFY_DEV_PID=$!" >> $GITHUB_ENV

      - name: Wait for /api/health readiness
        run: |
          echo "Waiting for netlify dev to be ready..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/api/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "Server is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: got $status, retrying in 2s..."
            sleep 2
            if [ "$i" = "30" ]; then
              echo "Server did not become ready in 60s"
              exit 1
            fi
          done

      - name: Seed service area config
        run: |
          python - << 'EOF'
          import os, requests
          from dotenv import load_dotenv
          from tests.helpers.auth import acquire_admin_token
          load_dotenv(".env.test")
          token = acquire_admin_token()
          r = requests.put(
              f"{os.environ['TEST_BASE_URL']}/api/admin/service-area",
              json={
                  "serviceableZips": [os.environ.get("TEST_IN_ZONE_ZIP", "30301")],
                  "excludedZips": [os.environ.get("TEST_EXCLUDED_ZIP", "30399")],
                  "unavailableZips": [os.environ.get("TEST_UNAVAILABLE_ZIP", "30350")],
                  "radiusMiles": 30,
              },
              headers={"Authorization": f"Bearer {token}"},
              timeout=10,
          )
          print(f"Seeded service area: {r.status_code}")
          assert r.status_code == 200, f"Seed failed: {r.text}"
          EOF

      - name: Run smoke tests (deploy gate)
        run: |
          mkdir -p reports
          pytest -m smoke \
            --junitxml=reports/smoke-junit.xml \
            -v \
            --tb=short

      - name: Run full regression suite
        if: github.event_name == 'push' || github.event.inputs.run_full_suite == 'true'
        run: |
          pytest -m "regression and not smoke" \
            --junitxml=reports/regression-junit.xml \
            --tb=short \
            -q

      - name: Run security tests
        if: github.event_name == 'push'
        run: |
          pytest -m security \
            --junitxml=reports/security-junit.xml \
            --tb=short \
            -q

      - name: Cleanup test data
        if: always()
        run: |
          python - << 'EOF'
          # Test data cleanup is scoped per testRunId via the test-lookup DELETE endpoint.
          # Session-level cleanup happens automatically via fixture teardown.
          # This step is a no-op if no testRunId is tracked — pytest session handles it.
          print("Test data cleanup complete (handled by fixture teardown)")
          EOF

      - name: Stop netlify dev
        if: always()
        run: kill $NETLIFY_DEV_PID || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30
